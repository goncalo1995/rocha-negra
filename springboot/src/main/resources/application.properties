spring.application.name=rochannegra-api

# Supabase Database Connection
# Get this from your Supabase Dashboard -> Project Settings -> Database -> Connection string
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Settings
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
# ddl-auto=validate tells Hibernate to check if the tables match the entities, but not to create or alter them. This is correct since our SQL migrations are the source of truth.

# Custom property for our app
supabase.url=${SUPABASE_URL}


# Jackson Naming Strategy
spring.jackson.property-naming-strategy=SNAKE_CASE