spring.application.name=rochannegra-api

# Supabase Database Connection
# Get this from your Supabase Dashboard -> Project Settings -> Database -> Connection string
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Set the maximum number of connections Hikari will open.
# For Supabase free tier, a low number like 3-5 is safe.
spring.datasource.hikari.maximum-pool-size=3
# This ensures that even if the URL doesn't have the parameter, prepared statements are off.
spring.datasource.hikari.data-source-properties.prepareThreshold=0

# JPA/Hibernate Settings
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
# ddl-auto=validate tells Hibernate to check if the tables match the entities, but not to create or alter them. This is correct since our SQL migrations are the source of truth.

# Custom property for our app
supabase.url=${SUPABASE_URL}

# Large headers OpenAPI
server.max-http-request-header-size=64KB
# If you also have very large response headers (rare, but possible with big OpenAPI docs)
# server.tomcat.max-http-response-header-size=64KB

# Actuator
management.endpoints.web.exposure.include=*
management.endpoints.web.exposure.exclude=loggers

# Jackson Naming Strategy
# spring.jackson.property-naming-strategy=SNAKE_CASE

# Telegram Bot
telegram.bot.username=${TELEGRAM_BOT_USERNAME}
telegram.bot.token=${TELEGRAM_BOT_TOKEN}

# Logging
logging.level.com.rochanegra=INFO
logging.level.org.springframework.security=DEBUG